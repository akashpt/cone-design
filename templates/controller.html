<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Texa | COPS - Controller</title>

    <link rel="stylesheet" href="../static/css/all.min.css" />
    <link rel="stylesheet" href="../static/css/style.css" />
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <style>
      .text-center {
        text-align: center;
      }
      .text-end {
        text-align: end;
      }
      .pb-4 {
        padding-bottom: 15px;
      }
      .pt-4 {
        padding-top: 15px;
      }

      :root {
        --font-sans: "Inter", sans-serif;
        --primary: #722f37;
        --primary-d: #5a242c;
        --primary-l: #9a5a62;
        --primary-xl: #f8f0f1;
        --bg: #f0f2f4;
        --card: #ffffff;
        --text: #1a1f2e;
        --muted: #6b7280;
        --border: #e2e6ea;
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      body {
        background: var(--bg);
        font-family: var(--font-sans);
        color: var(--text);
        margin: 0;
      }

      .camera-settings {
        padding: 28px;
        background: var(--card);
        border-radius: 16px;
        margin: 32px;
        box-shadow: var(--shadow-sm);
        height: fit-content;
        width: 100%;
      }

      .camera-settings-flex {
        display: flex;
        justify-content: space-between;
        gap: 40px;
      }

      h3 {
        margin: 0 0 24px 0;
        color: var(--primary);
        font-size: 1.4rem;
        font-weight: 600;
      }

      .field {
        margin-bottom: 28px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: var(--text);
        font-size: 0.98rem;
      }

      /* ─── Custom Searchable Dropdown ─── */
      .custom-select-container {
        position: relative;
      }

      .search-input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 1rem;
        background: white;
        transition: all 0.15s ease;
      }

      .search-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(114, 47, 55, 0.14);
      }

      .options-list {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        max-height: 260px;
        overflow-y: auto;
        background: white;
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-top: 6px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        z-index: 20;
        display: none;
      }

      .options-list.show {
        display: block;
      }

      .option {
        padding: 12px 16px;
        cursor: pointer;
        font-size: 0.97rem;
        color: var(--text);
        transition: background 0.12s;
      }

      .option:hover,
      .option.selected {
        background: var(--primary-xl);
        color: var(--primary);
      }

      /* ── Exposure Row ── */
      .exposure-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      /* ── Stepper buttons ── */
      .exp-btn {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        background: white;
        color: var(--text);
        font-size: 1.15rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition:
          border-color 0.15s,
          background 0.15s,
          color 0.15s;
        user-select: none;
      }

      .exp-btn:hover {
        border-color: var(--primary);
        color: var(--primary);
        background: var(--primary-xl);
      }

      .exp-btn:active {
        transform: scale(0.93);
      }

      /* ── Slider ── */
      .exp-slider-wrap {
        flex: 1;
        position: relative;
        margin-right: 20px;
        margin-left: 20px;
      }

      .exp-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 6px;
        border-radius: 999px;
        outline: none;
        cursor: pointer;
        background: #e2e6ea;
        transition: background 0.2s;
      }

      .exp-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: white;
        border: 2.5px solid var(--primary);
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.15);
        cursor: pointer;
        transition:
          transform 0.15s,
          box-shadow 0.15s;
      }

      .exp-slider::-webkit-slider-thumb:hover {
        transform: scale(1.1);
        box-shadow: 0 2px 10px rgba(114, 47, 55, 0.25);
      }

      .exp-slider::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: white;
        border: 2.5px solid var(--primary);
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.15);
        cursor: pointer;
      }

      /* ── Number input ── */
      .exp-input {
        width: 110px;
        height: 36px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        text-align: center;
        font-size: 0.95rem;
        font-weight: 600;
        font-family: monospace;
        color: var(--text);
        background: white;
        outline: none;
        flex-shrink: 0;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        margin-left: 20px;
      }

      .exp-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(114, 47, 55, 0.1);
      }

      /* ── Scale ticks ── */
      .exp-scale {
        display: flex;
        justify-content: space-between;
        margin-top: 6px;
        padding: 0 1px;
      }

      .exp-scale span {
        font-size: 0.72rem;
        color: var(--muted);
        font-family: monospace;
      }

      .exp-scale span.center {
        font-weight: 600;
        color: var(--primary);
      }

      .help {
        font-size: 0.8rem;
        color: var(--muted);
        margin-top: 10px;
      }

      .save_btn {
        border: 1px solid var(--primary);
        background: var(--primary);
        color: white;
        padding: 10px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 500;
      }

      .save_btn:hover {
        background: white;
        color: var(--primary);
      }
    </style>
  </head>
  <body>
    <div id="loaderDots" class="dots-loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <aside>
      <div class="logo-area">
        <div class="logo_div">
          <a href="index.html"
            ><img src="../static/img/logo.png" alt="Logo"
          /></a>
        </div>
      </div>
      <div class="menu-section">
        <div class="menu-label">Navigation</div>
        <a href="index.html"
          ><div class="menu-item" id="menuHome">
            <i class="fa-solid fa-house"></i> HOME
          </div></a
        >
        <div class="menu-item" id="menuReport">
          <i class="fa-solid fa-chart-simple"></i> REPORT
        </div>
        <div class="menu-item active" id="menuController">
          <i class="fa-solid fa-sliders"></i> CONTROLLER
        </div>
        <a href="training.html"
          ><div class="menu-item" id="menuTraining">
            <i class="fa-solid fa-microchip"></i> TRAINING
          </div></a
        >
        <div class="menu-label" style="margin-top: 4px">System</div>
        <div class="menu-item"><i class="fa-solid fa-gear"></i> SETTINGS</div>
      </div>
      <div class="sidebar-footer">
        <div class="signal-block">
          <div class="signal-label">COPS Count</div>
          <div class="signal-value">
            <span class="signal-dot"></span><span id="signalCount">244</span>
          </div>
        </div>
      </div>
    </aside>

    <main>
      <header>
        <div class="header-left">
          <span class="breadcrumb">COPS Inspection</span>
          <span class="header-badge">YARN INSPECTION</span>
        </div>
        <div id="statusPill" class="status-pill waiting">
          <span class="status-dot"></span>
          <span id="statusText">WAITING</span>
        </div>
        <div class="header-right">
           <div class="header-user">
            <i
              class="fa-solid fa-user"
              style="opacity: 0.8; font-size: 0.68rem"
            ></i>
          </div>
        </div>
      </header>

      <div class="content" style="padding: 32px 24px">
        <div class="camera-settings">
          <h3 class="text-center">Camera Setup</h3>

          <div class="camera-settings-flex">
            <div style="max-width: 420px">
              <h3>Select Camera</h3>
              <div class="field">
                <div class="custom-select-container">
                  <input
                    type="text"
                    id="cameraSearch"
                    class="search-input"
                    placeholder="Search or select camera…"
                    autocomplete="off"
                  />
                  <div id="cameraOptions" class="options-list"></div>
                  <input type="hidden" id="cameraValue" />
                </div>
              </div>
            </div>

            <div style="width: 700px">
              <h3>Exposure Time</h3>

              <div class="exposure-row">
                <button class="exp-btn" id="expMinus" title="Decrease">
                  −
                </button>

                <div class="exp-slider-wrap">
                  <input
                    type="range"
                    class="exp-slider"
                    id="expSlider"
                    min="10"
                    max="1000000"
                    step="10"
                    value="5000"
                  />
                  <div class="exp-scale" id="expScale"></div>
                </div>

                <button class="exp-btn" id="expPlus" title="Increase">+</button>

                <input
                  type="text"
                  class="exp-input"
                  id="expInput"
                  value="5000"
                  maxlength="12"
                />
              </div>

              <div class="help" id="rangeHelp">
                Select a camera to see supported exposure range
              </div>
            </div>
          </div>

          <div class="text-end pt-4 pb-4">
            <button class="save_btn" id="saveSettingsBtn">Save Settings</button>
          </div>
        </div>
      </div>
    </main>

    <div class="toast" id="toast">
      <i class="fa-solid fa-circle-check"></i>
      <span id="toastMsg">Done.</span>
    </div>

    <script src="../static/script/controller.js"></script>

    <script>
      // ─── Camera list ───────────────────────────────────────
      const cameras = [
        { value: "webcam", label: "Webcam" },
        { value: "hikrobot", label: "HikRobot Camera" },
        { value: "lucid", label: "Lucid Camera" },
        { value: "rtsp", label: "RTSP / IP Camera" },
        { value: "mindvision", label: "MindVision Camera" },
      ];

      // ─── Exposure ranges per camera ────────────────────────
      const exposureRanges = {
        webcam: {
          min: 1,
          max: 100,
          unit: "",
          step: 1,
          fmt: (v) => v.toString(),
        },
        rtsp: {
          min: 1000,
          max: 20000,
          unit: "µs",
          step: 100,
          fmt: (v) => v.toString(),
        },
        hikrobot: {
          min: 28,
          max: 1000000,
          unit: "µs",
          step: 10,
          fmt: (v) => v.toLocaleString(),
        },
        lucid: {
          min: 20,
          max: 30000000,
          unit: "µs",
          step: 10,
          fmt: (v) => v.toLocaleString(),
        },
        mindvision: {
          min: 10,
          max: 10000000,
          unit: "µs",
          step: 10,
          fmt: (v) => v.toLocaleString(),
        },
        default: {
          min: 10,
          max: 1000000,
          unit: "µs",
          step: 10,
          fmt: (v) => v.toLocaleString(),
        },
      };

      // ─── DOM elements ──────────────────────────────────────
      const searchInput = document.getElementById("cameraSearch");
      const optionsList = document.getElementById("cameraOptions");
      const hiddenInput = document.getElementById("cameraValue");
      const slider = document.getElementById("expSlider");
      const input = document.getElementById("expInput");
      const minusBtn = document.getElementById("expMinus");
      const plusBtn = document.getElementById("expPlus");
      const scale = document.getElementById("expScale");
      const helpText = document.getElementById("rangeHelp");

      let currentRange = exposureRanges.default;

      // ─── Format number with unit ───────────────────────────
      function formatValue(v) {
        return (
          currentRange.fmt(Math.round(v)) +
          (currentRange.unit ? " " + currentRange.unit : "")
        );
      }

      // ─── Update slider attributes & scale labels ───────────
      function updateExposureRange(camValue) {
        currentRange = exposureRanges[camValue] || exposureRanges.default;

        slider.min = currentRange.min;
        slider.max = currentRange.max;
        slider.step = currentRange.step;

        // Choose sensible starting value (≈ middle, rounded to step)
        let startVal =
          Math.round(
            (currentRange.min + currentRange.max) / 2 / currentRange.step,
          ) * currentRange.step;
        startVal = Math.max(
          currentRange.min,
          Math.min(currentRange.max, startVal),
        );

        slider.value = startVal;
        input.value = currentRange.fmt(startVal);

        helpText.innerHTML = `Range: ${formatValue(currentRange.min)} – ${formatValue(currentRange.max)}`;

        updateScaleLabels();
        updateSliderStyle();
      }

      function updateScaleLabels() {
        scale.innerHTML = ""; // clear previous labels

        const min = Number(slider.min);
        const max = Number(slider.max);
        const mid = (min + max) / 2;

        // Helper to create one label
        function addLabel(value, isCenter = false) {
          const rounded =
            Math.round(value / currentRange.step) * currentRange.step;
          const safeVal = Math.max(min, Math.min(max, rounded));

          const span = document.createElement("span");
          span.textContent = formatValue(safeVal);
          if (isCenter) span.classList.add("center");
          scale.appendChild(span);
        }

        // Only three labels: left – center – right
        addLabel(min, false); // start
        addLabel(mid, true); // center (will get .center style)
        addLabel(max, false); // end
      }
      function updateSliderStyle() {
        const val = Number(slider.value);
        const min = Number(slider.min);
        const max = Number(slider.max);
        const pct = max > min ? ((val - min) / (max - min)) * 100 : 0;

        const mid = (min + max) / 2;
        const color =
          val < mid ? "#ef4444" : val > mid ? "#3b82f6" : "var(--primary)";

        slider.style.background = `linear-gradient(to right, #e2e6ea 0%, ${color} ${pct}%, #e2e6ea ${pct}%)`;

        input.style.color = val === mid ? "var(--text)" : color;
        input.style.borderColor = val === mid ? "var(--border)" : color + "88";
      }

      // ─── UI event handlers ─────────────────────────────────
      function renderOptions(filter = "") {
        optionsList.innerHTML = "";
        const filtered = cameras.filter((c) =>
          c.label.toLowerCase().includes(filter.toLowerCase()),
        );

        if (filtered.length === 0) {
          const item = document.createElement("div");
          item.className = "option";
          item.textContent = "No matching cameras";
          item.style.color = "var(--muted)";
          item.style.cursor = "default";
          optionsList.appendChild(item);
          return;
        }

        filtered.forEach((cam) => {
          const item = document.createElement("div");
          item.className = "option";
          item.textContent = cam.label;
          item.dataset.value = cam.value;

          item.addEventListener("click", () => {
            searchInput.value = cam.label;
            hiddenInput.value = cam.value;
            optionsList.classList.remove("show");
            updateExposureRange(cam.value);
            // bridge?.selectCamera?.(cam.value);   // uncomment when Qt bridge is ready
          });

          optionsList.appendChild(item);
        });
      }

      searchInput.addEventListener("focus", () => {
        optionsList.classList.add("show");
        renderOptions(searchInput.value);
      });

      searchInput.addEventListener("input", () => {
        renderOptions(searchInput.value);
        optionsList.classList.add("show");
      });

      document.addEventListener("click", (e) => {
        if (
          !searchInput.contains(e.target) &&
          !optionsList.contains(e.target)
        ) {
          optionsList.classList.remove("show");
        }
      });

      // Slider & input sync
      slider.addEventListener("input", () => {
        input.value = currentRange.fmt(slider.value);
        updateSliderStyle();
      });

      input.addEventListener("input", () => {
        let v = parseFloat(input.value.replace(/[^0-9]/g, ""));
        if (isNaN(v)) v = currentRange.min;
        v = Math.max(currentRange.min, Math.min(currentRange.max, v));
        slider.value = v;
        input.value = currentRange.fmt(v);
        updateSliderStyle();
      });

      input.addEventListener("blur", () => {
        let v = parseFloat(input.value.replace(/[^0-9]/g, ""));
        if (isNaN(v)) v = currentRange.min;
        v = Math.round(v / currentRange.step) * currentRange.step;
        v = Math.max(currentRange.min, Math.min(currentRange.max, v));
        slider.value = v;
        input.value = currentRange.fmt(v);
        updateSliderStyle();
      });

      minusBtn.addEventListener("click", () => {
        let v = Number(slider.value) - currentRange.step;
        v = Math.max(currentRange.min, v);
        slider.value = v;
        input.value = currentRange.fmt(v);
        updateSliderStyle();
      });

      plusBtn.addEventListener("click", () => {
        let v = Number(slider.value) + currentRange.step;
        v = Math.min(currentRange.max, v);
        slider.value = v;
        input.value = currentRange.fmt(v);
        updateSliderStyle();
      });

      // ─── Init ──────────────────────────────────────────────
      renderOptions();
      updateExposureRange("hikrobot"); // or any default you prefer
    </script>
  </body>
</html>
